<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - VS Code版</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-gamepad"></i> 俄罗斯方块</h1>
            <p class="subtitle">在VS Code中享受经典游戏！</p>
        </header>

        <main class="game-area">
            <div class="left-panel">
                <div class="game-board">
                    <canvas id="gameCanvas" width="300" height="600"></canvas>
                </div>
                
                <div class="controls">
                    <button id="startBtn" class="btn btn-primary">
                        <i class="fas fa-play"></i> 开始游戏
                    </button>
                    <button id="pauseBtn" class="btn btn-secondary">
                        <i class="fas fa-pause"></i> 暂停 (P)
                    </button>
                    <button id="restartBtn" class="btn btn-warning">
                        <i class="fas fa-redo"></i> 重新开始
                    </button>
                </div>
            </div>

            <div class="right-panel">
                <div class="info-card">
                    <h3><i class="fas fa-chart-line"></i> 游戏信息</h3>
                    <div class="info-item">
                        <span class="label">分数</span>
                        <span id="score" class="value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="label">等级</span>
                        <span id="level" class="value">1</span>
                    </div>
                    <div class="info-item">
                        <span class="label">消除行数</span>
                        <span id="lines" class="value">0</span>
                    </div>
                    <div class="info-item">
                        <span class="label">下一个</span>
                        <div class="next-piece">
                            <canvas id="nextCanvas" width="120" height="120"></canvas>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <h3><i class="fas fa-keyboard"></i> 控制说明</h3>
                    <div class="controls-list">
                        <div class="control-item">
                            <kbd>←</kbd><kbd>→</kbd>
                            <span>左右移动</span>
                        </div>
                        <div class="control-item">
                            <kbd>↑</kbd>
                            <span>旋转方块</span>
                        </div>
                        <div class="control-item">
                            <kbd>↓</kbd>
                            <span>加速下落</span>
                        </div>
                        <div class="control-item">
                            <kbd>空格</kbd>
                            <span>直接落下</span>
                        </div>
                        <div class="control-item">
                            <kbd>P</kbd>
                            <span>暂停/继续</span>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <h3><i class="fas fa-info-circle"></i> 游戏规则</h3>
                    <ul class="rules-list">
                        <li>消除一行: <span class="points">100分</span></li>
                        <li>消除两行: <span class="points">300分</span></li>
                        <li>消除三行: <span class="points">500分</span></li>
                        <li>消除四行: <span class="points">800分</span></li>
                        <li>每10行升一级，速度加快</li>
                    </ul>
                </div>
            </div>
        </main>

        <div class="game-over" id="gameOver">
            <div class="game-over-content">
                <h2><i class="fas fa-trophy"></i> 游戏结束!</h2>
                <p>最终分数: <span id="finalScore">0</span></p>
                <p>消除行数: <span id="finalLines">0</span></p>
                <p>最高等级: <span id="finalLevel">1</span></p>
                <button id="playAgainBtn" class="btn btn-success">
                    <i class="fas fa-play-circle"></i> 再玩一次
                </button>
            </div>
        </div>

        <footer class="footer">
            <p>在Visual Studio Code中创建 | 俄罗斯方块 © 2023</p>
            <p class="hint">提示: 在VS Code中右键点击index.html，选择"在浏览器中打开"</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
